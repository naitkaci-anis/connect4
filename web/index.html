<!doctype html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Puissance 4 — Web</title>
    <link rel="stylesheet" href="./styles.css" />
</head>

<body>
    <div class="app">
        <!-- Top bar -->
        <header class="topbar">
            <div class="controls-left">
                <div class="control">
                    <label>Mode :</label>
                    <select id="mode">
            <option value="2">2 joueurs (human vs human)</option>
            <option value="1">1 joueur (human vs robot)</option>
            <option value="0">0 joueur (robot vs robot)</option>
          </select>
                </div>

                <div class="control">
                    <label>Robot :</label>
                    <select id="robot">
            <option value="random">Random</option>
            <option value="minimax">MiniMax</option>
          </select>
                </div>

                <div class="control">
                    <label>Profondeur :</label>
                    <input id="depth" type="number" min="1" max="8" value="3" />
                </div>
            </div>

            <div class="controls-right">
                <button class="btn" id="btnNew">Nouveau</button>
                <button class="btn" id="btnPause">Pause</button>
                <button class="btn" id="btnPrev">← Précédent</button>
                <button class="btn" id="btnNext">→ Suivant</button>

                <!-- ✅ On supprime Sauvegarder + Charger -->
                <!-- ✅ On garde DB mais on renomme -->
                <button class="btn" id="btnLoadDb">Parties précédentes</button>

                <button class="btn" id="btnSettings">⚙ Réglages</button>
            </div>
        </header>

        <!-- Main area -->
        <main class="main">
            <div class="layout">
                <div class="board-wrap">
                    <div class="colnums" id="colnums"></div>

                    <!-- ghost piece -->
                    <div class="ghost" id="ghost"></div>

                    <!-- board -->
                    <div class="board" id="board"></div>
                </div>

                <aside class="sidebar">
                    <div class="panel">
                        <div class="panel-title">Historique des coups</div>
                        <div class="panel-sub" id="movesMeta">0 coup</div>
                        <ol class="moves" id="movesList"></ol>
                    </div>
                </aside>
            </div>
        </main>

        <!-- Bottom status bar -->
        <footer class="statusbar">
            <div id="statusLeft" class="status-left"></div>

            <div class="status-right">
                <div class="progress">
                    <div class="progress-fill" id="progressFill" style="width:0%"></div>
                </div>
                <div id="progressTxt" class="progress-txt">0/0</div>
            </div>
        </footer>
    </div>

    <!-- Winner modal -->
    <div class="modal" id="winnerModal" aria-hidden="true">
        <div class="modal-card">
            <div class="modal-title" id="winnerTitle">Fin de partie</div>
            <div class="modal-text" id="winnerText"></div>
            <div class="modal-actions">
                <button class="btn" id="btnCloseWinner">OK</button>
                <button class="btn btn-primary" id="btnNewFromWinner">Nouvelle partie</button>
            </div>
        </div>
    </div>

    <script src="./app.js"></script>
</body>

</html>
